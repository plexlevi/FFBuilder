name: Build & Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14   # Apple Silicon (arm64)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate tag version matches app version
        run: |
          app_version=$(python -c "from app.shared.version import APP_VERSION; print(APP_VERSION)")
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$app_version" != "$tag_version" ]]; then
            echo "Version mismatch: tag=$tag_version app=$app_version"
            exit 1
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}" TARGET_ARCH=arm64 bash installers/build_macos.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/FFBuilder-*-macos.dmg
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
