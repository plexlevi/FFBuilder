name: Cut Release

on:
  workflow_dispatch:
    inputs:
      part:
        description: "Semver bump part"
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      channel:
        description: "Release channel"
        type: choice
        required: true
        default: alpha
        options:
          - stable
          - alpha
          - beta
          - rc

permissions:
  contents: write

jobs:
  cut-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump app version
        id: bump
        run: |
          new_version=$(python tools/bump_version.py --part "${{ inputs.part }}" --channel "${{ inputs.channel }}")
          echo "new_version=$new_version" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/shared/version.py
          git commit -m "chore(release): v${{ steps.bump.outputs.new_version }}"

      - name: Tag release
        run: git tag "v${{ steps.bump.outputs.new_version }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD
          git push origin "v${{ steps.bump.outputs.new_version }}"
